<clipPath id="lc11"><rect x="500" y="290.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.015s" fill="freeze"/></rect></clipPath>
<clipPath id="lc12"><rect x="500" y="314.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.13s" fill="freeze"/></rect></clipPath>
<clipPath id="lc13"><rect x="500" y="338.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.245s" fill="freeze"/></rect></clipPath>
<clipPath id="lc14"><rect x="500" y="362.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.36s" fill="freeze"/></rect></clipPath>
