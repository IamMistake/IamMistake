<tspan x="30" y="267.00" xml:space="preserve">          arch btw / rust enjoyer</tspan>
<tspan x="30" y="286.00" xml:space="preserve"></tspan>
<tspan x="30" y="305.00" xml:space="preserve">        fast tools, tiny loops,</tspan>
<tspan x="30" y="324.00" xml:space="preserve">        clean interfaces, sharp edges</tspan>
  </text>
  </g>

  <g><text x="520" y="0" fill="#dbeafe"><tspan x="520" y="42" class="head">nikola@iammistake</tspan><tspan class="cc"> -——————————————————————————————————————————————————————</tspan></text></g>
