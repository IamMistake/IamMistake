<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
<defs>
  <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#22D3EE">
      <animate attributeName="stop-color" values="#22D3EE;#7C3AED;#38BDF8;#22D3EE" dur="9s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#7C3AED">
      <animate attributeName="stop-color" values="#7C3AED;#38BDF8;#22D3EE;#7C3AED" dur="9s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#0B1120" stop-opacity="0.6"/>
  </radialGradient>
  <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
    <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.05"/>
    <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.65"/>
    <stop offset="55%" stop-color="#7C3AED" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </linearGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7DD3FC" opacity="0.05"/>
  </pattern>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <mask id="revealMask" maskUnits="userSpaceOnUse" x="0" y="0" width="1180" height="620">
    <rect x="0" y="0" width="1180" height="0" fill="#fff">
      <animate attributeName="height" from="0" to="560" dur="2.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect>
  </mask>
  <clipPath id="lc0"><rect x="500" y="26.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="0.75s" fill="freeze"/></rect></clipPath>
<clipPath id="lc1"><rect x="500" y="50.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="0.865s" fill="freeze"/></rect></clipPath>
<clipPath id="lc2"><rect x="500" y="74.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="0.98s" fill="freeze"/></rect></clipPath>
<clipPath id="lc3"><rect x="500" y="98.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.095s" fill="freeze"/></rect></clipPath>
<clipPath id="lc4"><rect x="500" y="122.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.21s" fill="freeze"/></rect></clipPath>
<clipPath id="lc5"><rect x="500" y="146.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.325s" fill="freeze"/></rect></clipPath>
<clipPath id="lc6"><rect x="500" y="170.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.44s" fill="freeze"/></rect></clipPath>
<clipPath id="lc7"><rect x="500" y="194.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.555s" fill="freeze"/></rect></clipPath>
<clipPath id="lc8"><rect x="500" y="218.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.67s" fill="freeze"/></rect></clipPath>
<clipPath id="lc9"><rect x="500" y="242.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.785s" fill="freeze"/></rect></clipPath>
<clipPath id="lc10"><rect x="500" y="266.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="1.9s" fill="freeze"/></rect></clipPath>
<clipPath id="lc11"><rect x="500" y="290.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.015s" fill="freeze"/></rect></clipPath>
<clipPath id="lc12"><rect x="500" y="314.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.13s" fill="freeze"/></rect></clipPath>
<clipPath id="lc13"><rect x="500" y="338.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.245s" fill="freeze"/></rect></clipPath>
<clipPath id="lc14"><rect x="500" y="362.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.36s" fill="freeze"/></rect></clipPath>
<clipPath id="lc15"><rect x="500" y="386.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.475s" fill="freeze"/></rect></clipPath>
<clipPath id="lc16"><rect x="500" y="410.00" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.38s" begin="2.59s" fill="freeze"/></rect></clipPath>
  <style>
    .ascii  { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: url(#asciiGrad); letter-spacing: -0.2px; }
    .key    { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #22D3EE; font-weight: bold; }
    .value  { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #E5E7EB; }
    .cc     { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #475569; }
    .head   { font-family: 'Courier New', Consolas, monospace; font-size: 17px; fill: #7C3AED; font-weight: bold; }
    .accent { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #10B981; font-weight: bold; }
    text, tspan { white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .scan-label { font-family: 'Courier New', Consolas, monospace; font-size: 10px; fill: #F87171; letter-spacing: 1px; }
    .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.75; }
    .cursor-blink { fill: #22D3EE; }
  </style>
</defs>

<rect width="1180" height="610" rx="18" fill="url(#bgGlow)"/>
<rect width="1180" height="610" rx="18" fill="url(#scanlines)"/>

<g id="titlebar">
  <rect x="3" y="3" width="1174" height="34" rx="16" fill="#0B1120" fill-opacity="0.85"/>
  <text x="590" y="25" text-anchor="middle" class="term-label">nikola@iammistake ~ % cat about.json</text>
</g>

<g transform="translate(0,38)">
  <rect x="14" y="26" width="488" height="468" rx="14" fill="#0B1120" fill-opacity="0.35" stroke="url(#borderGrad)" stroke-width="1" opacity="0.35"/>
  <rect x="508" y="10" width="655" height="500" rx="14" fill="#0B1120" fill-opacity="0.35" stroke="url(#borderGrad)" stroke-width="1" opacity="0.35"/>
  <text x="30" y="24" class="panel-title">VISUAL.MAP</text>
  <text x="524" y="24" class="panel-title">SYSTEM.INFO</text>

  <g mask="url(#revealMask)">
  <text x="30" y="0" class="ascii">
<tspan x="30" y="96.00" xml:space="preserve">.--.</tspan>
<tspan x="30" y="115.00" xml:space="preserve">                 |o_o |</tspan>
